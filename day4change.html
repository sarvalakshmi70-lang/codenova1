<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="message1">Hello guys!</h1>
    <button onclick="changebutton()">change</button>
    
</body>
</html>
<script>
    
    var h1 = document.getElementById("message1");
    var command= true;
    function changebutton() {
        command = !command;
        if (command) {
            h1.textContent = "Hello guys!";
        } else {
            h1.textContent = "see you later guys!";
        }
    }
</script>
